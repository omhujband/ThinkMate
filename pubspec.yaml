name: thinkmate
description: ThinkMate – On-Device AI Learning Companion. A personal AI study assistant with adaptive quizzes, concept simplification, and language practice.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # RunAnywhere SDK packages (remote from pub.dev)
  runanywhere: 0.16.0
  runanywhere_llamacpp: 0.16.0
  runanywhere_onnx: 0.16.0

  # UI and Icons
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  
  # State management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0
  http: ^1.2.0
  
  # Local storage
  shared_preferences: ^2.3.0
  path_provider: ^2.1.0

  # Document processing
  file_picker: ^8.0.0
  read_pdf_text: ^0.3.1

  # Audio (voice study)
  record: ^6.2.0
  audioplayers: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png

dev_dependencies:
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"